<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodExpress</title>
    <link rel="stylesheet" href="projet2.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">🍕 FoodExpress</div>
        <div class="cart" id="cartBtn">
            🛒 <span id="cartCount">0</span>
        </div>
    </header>

    <!-- BANNIÈRE -->
    <div class="banner">
        <h2>Livraison Gratuite 🚚</h2>
        <p>Commandes de plus de 13 000 FCFA</p>
    </div>

    <!-- PRODUITS -->
    <div class="container">
        <h2>Nos Plats</h2>
        <div class="products" id="products"></div>
    </div>

    <!-- PANIER -->
    <div id="cartPanel" class="cart-panel">
        <div class="cart-header">
            <h3>Mon Panier</h3>
            <button id="closeCartBtn">✕</button>
        </div>
        <div id="cartItems"></div>
        <div class="cart-footer">
            <p>Total : <span id="cartTotal">0 FCFA</span></p>
            <button id="checkoutBtn">✅ Commander</button>
            <button id="clearCartBtn">🗑️ Vider</button>
        </div>
    </div>

    <div id="overlay" class="overlay"></div>

    <script src="projet2.js"></script>
</body>
</html>
